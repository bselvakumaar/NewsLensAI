name: Deploy To GCP

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
  CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}

jobs:
  deploy-frontend:
    name: Deploy Frontend (Cloud Storage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REACT_APP_GCP_REGION: ${{ secrets.GCP_REGION }}
          REACT_APP_ENV: production

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy build to Cloud Storage
        run: |
          gsutil -m rsync -r -d build gs://${GCS_BUCKET}
          gsutil web set -m index.html -e index.html gs://${GCS_BUCKET}

      - name: Print live URL
        run: echo "Frontend URL -> https://storage.googleapis.com/${GCS_BUCKET}/index.html"

  deploy-backend:
    name: Deploy Backend (Cloud Run)
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: ${{ hashFiles('backend/Dockerfile') != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy backend source to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --source ./backend \
            --platform managed \
            --region "${GCP_REGION}" \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300

